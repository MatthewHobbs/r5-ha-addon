name: UI Tests

# Renders the bundled dashboards in a real Home Assistant across the top mobile device
# sizes and fails on text truncation / broken cards. Path-filtered so it only runs when the
# dashboards or the harness change (the rendering inputs).
on:
  push:
    branches: [main]
    paths:
      - 'renault_5/dashboards/**'
      - 'ui-tests/**'
      - '.github/workflows/ui-tests.yaml'
  pull_request:
    paths:
      - 'renault_5/dashboards/**'
      - 'ui-tests/**'
      - '.github/workflows/ui-tests.yaml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  responsive:
    name: Dashboard responsive render (mobile matrix)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          python-version: "3.11"

      - name: Install deps (aiohttp + PyYAML + Playwright/Chromium)
        run: |
          python3 -m pip install --quiet aiohttp PyYAML playwright
          python3 -m playwright install --with-deps chromium

      - name: Render dashboards across the mobile device matrix
        run: bash ui-tests/run.sh

      - name: Upload device screenshots
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dashboard-screenshots
          path: ui-tests/screenshots/
          if-no-files-found: warn
