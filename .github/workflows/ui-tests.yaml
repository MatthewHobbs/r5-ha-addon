name: UI Tests

# Renders the bundled dashboards in a real Home Assistant across the top mobile device
# sizes and fails on text truncation / broken cards. Path-filtered so it only runs when the
# dashboards or the harness change (the rendering inputs).
on:
  push:
    branches: [main]
    paths:
      - 'renault_5/dashboards/**'
      - 'renault_5/app/deploy.py'
      - 'ui-tests/**'
      - '.github/workflows/ui-tests.yaml'
  pull_request:
    paths:
      - 'renault_5/dashboards/**'
      - 'renault_5/app/deploy.py'
      - 'ui-tests/**'
      - '.github/workflows/ui-tests.yaml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  responsive:
    name: Dashboard responsive render (mobile matrix)
    runs-on: ubuntu-latest
    steps:
      # Default checkout: for a PR this renders the merge ref (the PR's dashboard/deploy.py
      # changes). This job holds NO secrets — committing the refreshed screenshots back to the
      # PR branch is done by the separate, trusted "Refresh screenshots" workflow (workflow_run),
      # which never runs the PR's code with the PAT.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1  # v6.3.0
        with:
          # Match the add-on runtime (HA base 3.24 → Python 3.14); the harness imports app/deploy.py.
          python-version: "3.14"

      - name: Install deps (aiohttp + PyYAML + Playwright/Chromium + Pillow)
        run: |
          python3 -m pip install --quiet aiohttp PyYAML playwright pillow
          python3 -m playwright install --with-deps chromium

      - name: Render dashboards across the mobile device matrix
        env:
          UI_TESTS_DARK: "1"   # render dark (the truncation gate is colour-agnostic)
        run: bash ui-tests/run.sh

      # The refreshed docs screenshots are committed by the separate "Refresh screenshots"
      # workflow (refresh-screenshots.yaml), which downloads this artifact. Uploaded always so
      # a failed render still surfaces the partial shots for debugging.
      - name: Upload device screenshots
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7.0.1
        with:
          name: dashboard-screenshots
          path: ui-tests/screenshots/
          if-no-files-found: warn
