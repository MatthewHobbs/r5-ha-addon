name: Release

# Build the add-on image for every architecture, and on a push to main:
#   * publish the multi-arch image to GHCR (Cosign-signed, keyless OIDC), and
#   * create a `v<version>` git tag + GitHub Release when config.yaml's version is new.
# On pull requests it BUILDS only (no push) as a sanity check — nothing is published
# and no tag is created until the change is merged to main.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      architectures: ${{ steps.info.outputs.architectures }}
      build_matrix: ${{ steps.matrix.outputs.matrix }}
      image_name: ${{ steps.normalize.outputs.image_name }}
      registry_prefix: ${{ steps.normalize.outputs.registry_prefix }}
      version: ${{ steps.normalize.outputs.version }}
      name: ${{ steps.normalize.outputs.name }}
      description: ${{ steps.normalize.outputs.description }}
      url: ${{ steps.normalize.outputs.url }}
      is_new: ${{ steps.newcheck.outputs.is_new }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Get add-on information
        id: info
        uses: home-assistant/actions/helpers/info@f4ca6f671bd429efb108c0f2fa0ae8af0215986c  # master
        with:
          path: "./renault_5"

      - name: Normalize add-on information
        id: normalize
        # Pass info-helper outputs via env (NOT inlined into the script): the description
        # contains parentheses and would otherwise break the shell parser.
        env:
          INFO_IMAGE: ${{ steps.info.outputs.image }}
          INFO_VERSION: ${{ steps.info.outputs.version }}
          INFO_NAME: ${{ steps.info.outputs.name }}
          INFO_DESCRIPTION: ${{ steps.info.outputs.description }}
          INFO_URL: ${{ steps.info.outputs.url }}
        run: |
          # The info helper preserves the literal quotes from quoted config.yaml scalars
          # (e.g. version: "0.9.7"), so strip them where the value flows into an image
          # reference / tag.
          image="${INFO_IMAGE//\"/}"
          echo "image_name=${image##*/}" >> "$GITHUB_OUTPUT"
          echo "registry_prefix=${image%/*}" >> "$GITHUB_OUTPUT"
          echo "version=${INFO_VERSION//\"/}" >> "$GITHUB_OUTPUT"
          echo "name=${INFO_NAME}" >> "$GITHUB_OUTPUT"
          echo "description=${INFO_DESCRIPTION}" >> "$GITHUB_OUTPUT"
          if [[ -n "$INFO_URL" && "$INFO_URL" != "null" ]]; then
            echo "url=${INFO_URL}" >> "$GITHUB_OUTPUT"
          fi

      - name: Is this version already released?
        id: newcheck
        env:
          VERSION: ${{ steps.normalize.outputs.version }}
        run: |
          tag="v${VERSION}"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "is_new=false" >> "$GITHUB_OUTPUT"
            echo "::notice::${tag} already exists — image/tag publish will be skipped (no version bump)."
          else
            echo "is_new=true" >> "$GITHUB_OUTPUT"
            echo "::notice::${tag} is new — image will be published and tagged on push to main."
          fi

      - name: Prepare build matrix
        id: matrix
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@4de35182ce1e329181bffcbcc84d33db5e2c7e10  # 2026.06.0
        with:
          architectures: ${{ steps.info.outputs.architectures }}
          image-name: ${{ steps.normalize.outputs.image_name }}
          registry-prefix: ${{ steps.normalize.outputs.registry_prefix }}

  build:
    name: Build ${{ matrix.arch }} image
    needs: prepare
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      id-token: write   # Cosign keyless signing (OIDC)
      packages: write   # push to GHCR
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.build_matrix) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      - name: Build image
        uses: home-assistant/builder/actions/build-image@4de35182ce1e329181bffcbcc84d33db5e2c7e10  # 2026.06.0
        with:
          arch: ${{ matrix.arch }}
          build-args: |
            BUILD_FROM=ghcr.io/home-assistant/${{ matrix.arch }}-base:3.19
            BUILD_VERSION=${{ needs.prepare.outputs.version }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          context: "./renault_5"
          image: ${{ matrix.image }}
          image-tags: |
            ${{ needs.prepare.outputs.version }}
            latest
          labels: |
            io.hass.type=addon
            io.hass.name=${{ needs.prepare.outputs.name }}
            io.hass.description=${{ needs.prepare.outputs.description }}
            ${{ needs.prepare.outputs.url && format('io.hass.url={0}', needs.prepare.outputs.url) || '' }}
          push: ${{ github.event_name == 'push' && needs.prepare.outputs.is_new == 'true' }}
          version: ${{ needs.prepare.outputs.version }}

  manifest:
    name: Publish multi-arch manifest
    needs: [prepare, build]
    if: ${{ github.event_name == 'push' && needs.prepare.outputs.is_new == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
    steps:
      - name: Publish multi-arch manifest
        uses: home-assistant/builder/actions/publish-multi-arch-manifest@4de35182ce1e329181bffcbcc84d33db5e2c7e10  # 2026.06.0
        with:
          architectures: ${{ needs.prepare.outputs.architectures }}
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image-name: ${{ needs.prepare.outputs.image_name }}
          image-tags: |
            ${{ needs.prepare.outputs.version }}
            latest
          registry-prefix: ${{ needs.prepare.outputs.registry_prefix }}

  tag:
    name: Tag release
    needs: [prepare, manifest]
    if: ${{ github.event_name == 'push' && needs.prepare.outputs.is_new == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the git tag + GitHub Release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Create v<version> tag + release when new
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          IMAGE: ${{ needs.prepare.outputs.registry_prefix }}/${{ needs.prepare.outputs.image_name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v${VERSION}"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists — nothing to do."
            exit 0
          fi
          echo "Tagging ${tag} at ${GITHUB_SHA}"
          gh release create "${tag}" \
            --target "${GITHUB_SHA}" \
            --title "${tag}" \
            --notes "Multi-arch image published & Cosign-signed: \`${IMAGE}:${VERSION}\`."
