name: Release

# Publishes the add-on image so that `config.yaml`'s version on main is NEVER advertised to
# Home Assistant before its image exists on GHCR (a Supervisor resolves the add-on image by
# `version`, so a version on main with no image behind it makes every install 404 on update).
#
# To guarantee that, the image is published on the PR that bumps the version — BEFORE the merge:
#   * On a same-repo PR whose config.yaml version is new (no `v<version>` tag yet): build every
#     arch, push them, and publish the multi-arch manifest to GHCR. The `Release image published`
#     gate then confirms `<image>:<version>` is pullable and is a REQUIRED check, so the bump
#     cannot merge until its image is live. (No attestation/tag on the PR.)
#   * On push to main: rebuild from the merged commit (the tag is already occupied by the PR
#     image, so there is no 404 window), republish, then attest build provenance — keyless
#     Sigstore via GitHub OIDC, pushed to GHCR (verify with
#     `gh attestation verify oci://<image>:<version> --owner MatthewHobbs`) — and create the
#     `v<version>` git tag + GitHub Release. Provenance is thus always attested from main.
# A PR that does not bump the version publishes nothing; the gate passes as a no-op.
# Fork PRs cannot push to GHCR, so a version bump must come from a branch in this repo.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  prepare:
    name: Prepare
    runs-on: ubuntu-latest
    outputs:
      architectures: ${{ steps.info.outputs.architectures }}
      build_matrix: ${{ steps.matrix.outputs.matrix }}
      image_name: ${{ steps.normalize.outputs.image_name }}
      registry_prefix: ${{ steps.normalize.outputs.registry_prefix }}
      version: ${{ steps.normalize.outputs.version }}
      name: ${{ steps.normalize.outputs.name }}
      description: ${{ steps.normalize.outputs.description }}
      url: ${{ steps.normalize.outputs.url }}
      is_new: ${{ steps.newcheck.outputs.is_new }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Get add-on information
        id: info
        uses: home-assistant/actions/helpers/info@f4ca6f671bd429efb108c0f2fa0ae8af0215986c  # master
        with:
          path: "./renault_5"

      - name: Normalize add-on information
        id: normalize
        # Pass info-helper outputs via env (NOT inlined into the script): the description
        # contains parentheses and would otherwise break the shell parser.
        env:
          INFO_IMAGE: ${{ steps.info.outputs.image }}
          INFO_VERSION: ${{ steps.info.outputs.version }}
          INFO_NAME: ${{ steps.info.outputs.name }}
          INFO_DESCRIPTION: ${{ steps.info.outputs.description }}
          INFO_URL: ${{ steps.info.outputs.url }}
        run: |
          # The info helper preserves the literal quotes from quoted config.yaml scalars
          # (e.g. version: "1.4.7"), so strip them where the value flows into an image
          # reference / tag.
          image="${INFO_IMAGE//\"/}"
          echo "image_name=${image##*/}" >> "$GITHUB_OUTPUT"
          echo "registry_prefix=${image%/*}" >> "$GITHUB_OUTPUT"
          echo "version=${INFO_VERSION//\"/}" >> "$GITHUB_OUTPUT"
          echo "name=${INFO_NAME}" >> "$GITHUB_OUTPUT"
          echo "description=${INFO_DESCRIPTION}" >> "$GITHUB_OUTPUT"
          if [[ -n "$INFO_URL" && "$INFO_URL" != "null" ]]; then
            echo "url=${INFO_URL}" >> "$GITHUB_OUTPUT"
          fi

      - name: Is this version already released?
        id: newcheck
        env:
          VERSION: ${{ steps.normalize.outputs.version }}
        run: |
          tag="v${VERSION}"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "is_new=false" >> "$GITHUB_OUTPUT"
            echo "::notice::${tag} already exists — image/tag publish will be skipped (no version bump)."
          else
            echo "is_new=true" >> "$GITHUB_OUTPUT"
            echo "::notice::${tag} is new — image will be published and tagged on push to main."
          fi

      - name: Prepare build matrix
        id: matrix
        uses: home-assistant/builder/actions/prepare-multi-arch-matrix@4de35182ce1e329181bffcbcc84d33db5e2c7e10  # 2026.06.0
        with:
          architectures: ${{ steps.info.outputs.architectures }}
          image-name: ${{ steps.normalize.outputs.image_name }}
          registry-prefix: ${{ steps.normalize.outputs.registry_prefix }}

  build:
    name: Build ${{ matrix.arch }} image
    needs: prepare
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      packages: write   # push to GHCR (per-arch images); attestation happens in `manifest`
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.build_matrix) }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0
        with:
          persist-credentials: false

      # The base image is pinned in the Dockerfile (FROM ghcr.io/home-assistant/base:<tag>, a
      # multi-arch image), so no BUILD_FROM build-arg / build.yaml is needed — the builder picks
      # the right platform per matrix arch.
      - name: Build image
        uses: home-assistant/builder/actions/build-image@4de35182ce1e329181bffcbcc84d33db5e2c7e10  # 2026.06.0
        with:
          arch: ${{ matrix.arch }}
          build-args: |
            BUILD_VERSION=${{ needs.prepare.outputs.version }}
          # Disable the builder's keyless Cosign signing. It defaults on and needs
          # `id-token: write`, which this job deliberately does NOT grant (provenance is attested
          # in the `manifest` job, the single source of image verification). Left enabled it
          # fails `cosign sign` with `expired_token` and takes the whole release down.
          cosign: "false"
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          context: "./renault_5"
          image: ${{ matrix.image }}
          # Only the immutable version tag — no mutable `latest`. A mid-matrix failure would
          # leave `latest` pointing at mixed-version arches; Supervisor resolves the add-on
          # image by config.yaml `version`, never by `latest`.
          image-tags: |
            ${{ needs.prepare.outputs.version }}
          labels: |
            io.hass.type=addon
            io.hass.name=${{ needs.prepare.outputs.name }}
            io.hass.description=${{ needs.prepare.outputs.description }}
            ${{ needs.prepare.outputs.url && format('io.hass.url={0}', needs.prepare.outputs.url) || '' }}
          # Push a new version's image on BOTH the merge (push to main) and the same-repo PR that
          # bumps it — the PR push is what makes `<image>:<version>` exist before merge, closing
          # the phantom-version window. Fork PRs can't write to GHCR, so they build only.
          push: ${{ needs.prepare.outputs.is_new == 'true' && (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository) }}
          version: ${{ needs.prepare.outputs.version }}

  manifest:
    name: Publish multi-arch manifest
    needs: [prepare, build]
    # Publish the multi-arch index on the merge AND on the same-repo version-bump PR (so the
    # image exists before merge). The attestation + tag steps below stay main-only.
    if: ${{ needs.prepare.outputs.is_new == 'true' && (github.event_name == 'push' || github.event.pull_request.head.repo.full_name == github.repository) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write      # OIDC token for keyless build-provenance attestation (push to main)
      packages: write      # push the multi-arch manifest + the attestation to GHCR
      attestations: write  # publish the build-provenance attestation
    steps:
      - name: Publish multi-arch manifest
        uses: home-assistant/builder/actions/publish-multi-arch-manifest@4de35182ce1e329181bffcbcc84d33db5e2c7e10  # 2026.06.0
        with:
          architectures: ${{ needs.prepare.outputs.architectures }}
          # Disable the builder's Cosign manifest signing too — image verification is provided by
          # the build-provenance attestation below, not Cosign (see the build job).
          cosign: "false"
          container-registry-password: ${{ secrets.GITHUB_TOKEN }}
          image-name: ${{ needs.prepare.outputs.image_name }}
          # Version tag only — no mutable `latest` (see the build job for the rationale).
          image-tags: |
            ${{ needs.prepare.outputs.version }}
          registry-prefix: ${{ needs.prepare.outputs.registry_prefix }}

      # Attest build provenance for the published multi-arch image. `build-image` /
      # `publish-multi-arch-manifest` do NOT expose the pushed digest as a step output (unlike
      # `docker/build-push-action`, which the polygonal exemplar relies on), so resolve the
      # manifest-list digest from the registry and attest that. The manifest list is what a
      # Supervisor pulls for `image: ghcr.io/matthewhobbs/renault_5` (no `{arch}` placeholder →
      # Docker resolves the platform from the index), so it is the subject a consumer verifies.
      - name: Log in to GHCR
        if: ${{ github.event_name == 'push' }}
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0  # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Provenance is attested only from main (push), so the released image always traces to a
      # commit on main — never a pre-merge PR build (which is transient and gets overwritten by
      # the rebuild below).
      - name: Resolve published manifest digest
        id: digest
        if: ${{ github.event_name == 'push' }}
        env:
          IMAGE_REF: ${{ needs.prepare.outputs.registry_prefix }}/${{ needs.prepare.outputs.image_name }}:${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          # The manifest-list (index) digest is, by definition, the sha256 of the raw index
          # bytes — compute it directly. (`--format '{{.Manifest.Digest}}'` is version-fragile:
          # on the runner's buildx that template silently falls back to the verbose default
          # output instead of the digest, which fails the regex below.)
          # Capture first (pipefail + the -z guard below): a failed inspect must NOT fall through
          # to `sha256sum` hashing an empty stream, which would yield the valid-looking
          # e3b0c442… empty-input hash and attest the wrong subject.
          raw="$(docker buildx imagetools inspect "$IMAGE_REF" --raw)"
          if [[ -z "$raw" ]]; then
            echo "::error::imagetools inspect returned no data for ${IMAGE_REF}"
            exit 1
          fi
          digest="sha256:$(printf '%s' "$raw" | sha256sum | cut -d' ' -f1)"
          if [[ ! "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]; then
            echo "::error::could not resolve a valid digest for ${IMAGE_REF} (got '${digest}')"
            exit 1
          fi
          echo "digest=${digest}" >> "$GITHUB_OUTPUT"
          echo "::notice::Resolved ${IMAGE_REF} → ${digest}"

      - name: Attest build provenance
        if: ${{ github.event_name == 'push' }}
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373  # v4.1.1
        with:
          subject-name: ${{ needs.prepare.outputs.registry_prefix }}/${{ needs.prepare.outputs.image_name }}
          subject-digest: ${{ steps.digest.outputs.digest }}
          push-to-registry: true

  tag:
    name: Tag release
    needs: [prepare, manifest]
    if: ${{ github.event_name == 'push' && needs.prepare.outputs.is_new == 'true' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write   # create the git tag + GitHub Release
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Create v<version> tag + release when new
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
          IMAGE: ${{ needs.prepare.outputs.registry_prefix }}/${{ needs.prepare.outputs.image_name }}
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="v${VERSION}"
          if git ls-remote --exit-code --tags origin "refs/tags/${tag}" >/dev/null 2>&1; then
            echo "Tag ${tag} already exists — nothing to do."
            exit 0
          fi
          echo "Tagging ${tag} at ${GITHUB_SHA}"
          gh release create "${tag}" \
            --target "${GITHUB_SHA}" \
            --title "${tag}" \
            --notes "Multi-arch image published: \`${IMAGE}:${VERSION}\` — build provenance attested (keyless, GitHub OIDC) and pushed to the registry. Verify: \`gh attestation verify oci://${IMAGE}:${VERSION} --owner MatthewHobbs\`."

  release-gate:
    name: Release image published
    # The merge gate. Make this a REQUIRED status check on main: a version-bump PR then cannot
    # merge until its image is live on GHCR, so main never advertises a version that 404s.
    # Runs on every PR and always reports (a no-op success when the version is unchanged), so it
    # never leaves a required check pending. `always()` so it evaluates even if build/manifest
    # were skipped for a non-bump PR.
    needs: [prepare, build, manifest]
    if: ${{ always() && github.event_name == 'pull_request' }}
    runs-on: ubuntu-latest
    steps:
      - name: Confirm the image exists before merge
        env:
          IS_NEW: ${{ needs.prepare.outputs.is_new }}
          SAME_REPO: ${{ github.event.pull_request.head.repo.full_name == github.repository }}
          IMAGE_REF: ${{ needs.prepare.outputs.registry_prefix }}/${{ needs.prepare.outputs.image_name }}:${{ needs.prepare.outputs.version }}
          PREPARE_RESULT: ${{ needs.prepare.result }}
          BUILD_RESULT: ${{ needs.build.result }}
          MANIFEST_RESULT: ${{ needs.manifest.result }}
        run: |
          set -euo pipefail
          # Fail CLOSED. This job uses always(), so it also runs when prepare/build failed — in
          # which case IS_NEW is empty and must NOT be read as a safe "no bump". If we can't
          # determine or trust the release state, block the merge rather than wave it through.
          if [[ "$PREPARE_RESULT" != "success" ]]; then
            echo "::error::prepare did not succeed ($PREPARE_RESULT) — cannot determine whether this is a version bump; blocking merge."
            exit 1
          fi
          if [[ "$BUILD_RESULT" != "success" ]]; then
            echo "::error::the image build did not succeed ($BUILD_RESULT); blocking merge."
            exit 1
          fi
          if [[ "$IS_NEW" != "true" ]]; then
            echo "No version bump — config.yaml version is already released; nothing to publish. Merge is safe."
            exit 0
          fi
          if [[ "$SAME_REPO" != "true" ]]; then
            echo "::error::This PR bumps the version but comes from a fork, which cannot publish to GHCR. Re-run the bump from a branch in this repository so the image is published before merge."
            exit 1
          fi
          if [[ "$MANIFEST_RESULT" != "success" ]]; then
            echo "::error::Version is new but the manifest was not published (manifest=$MANIFEST_RESULT). Merging would advertise a version with no image."
            exit 1
          fi
          # Belt-and-suspenders: the tag must actually resolve on the registry now.
          docker buildx imagetools inspect "$IMAGE_REF" >/dev/null
          echo "Image ${IMAGE_REF} is published and pullable — merging will not 404."
