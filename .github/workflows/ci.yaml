name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          file_or_dir: renault_5 repository.yaml
          config_file: .yamllint

      - name: Hadolint (Dockerfile)
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: renault_5/Dockerfile
          config: .hadolint.yaml

      - name: ShellCheck (run.sh)
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: renault_5
          additional_files: run.sh

      - name: Ruff (Python)
        uses: astral-sh/ruff-action@v3
        with:
          src: renault_5/app

      - name: Home Assistant add-on linter
        uses: frenck/action-addon-linter@v2
        with:
          path: ./renault_5

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Bandit (Python SAST)
        run: |
          python3 -m pip install --quiet bandit
          bandit -r renault_5/app -ll

      - name: pip-audit (dependency CVEs)
        run: |
          python3 -m pip install --quiet pip-audit
          pip-audit -r renault_5/app/requirements.txt

      - name: Trivy filesystem scan (vulns, misconfig, secrets)
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          trivy fs --scanners vuln,misconfig,secret \
            --severity HIGH,CRITICAL --exit-code 1 --ignore-unfixed .

  build:
    name: Build (amd64 sanity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./renault_5
          push: false
          build-args: BUILD_FROM=ghcr.io/home-assistant/amd64-base:3.19
