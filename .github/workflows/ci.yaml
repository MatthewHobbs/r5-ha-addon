name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: yamllint
        uses: ibiqlik/action-yamllint@2576378a8e339169678f9939646ee3ee325e845c # v3.1.1
        with:
          file_or_dir: renault_5 repository.yaml
          config_file: .yamllint

      - name: Hadolint (Dockerfile)
        uses: hadolint/hadolint-action@2332a7b74a6de0dda2e2221d575162eba76ba5e5 # v3.3.0
        with:
          dockerfile: renault_5/Dockerfile
          config: .hadolint.yaml

      - name: ShellCheck (run.sh)
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # v2.0.0
        with:
          scandir: renault_5
          additional_files: run.sh

      - name: Ruff (Python)
        uses: astral-sh/ruff-action@278981a28ce3188b1e39527901f38254bf3aac89 # v4.1.0
        with:
          src: renault_5/app renault_5/tests

      - name: Home Assistant add-on linter
        uses: frenck/action-addon-linter@f995494fd84fae6310d23617e66d0e37de4f14eb # v2.21.0
        with:
          path: ./renault_5

      # AppArmor is enforced by the Supervisor, not by a local docker run or the build job —
      # so a malformed/over-tight profile can break startup without any other job noticing.
      # Compile it here with the real parser to catch syntax errors before release.
      - name: AppArmor profile compiles
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq apparmor
          apparmor_parser -Q -K renault_5/apparmor.txt
          echo "apparmor.txt compiled OK"

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          # Match the add-on runtime: HA base 3.24 ships Python 3.14 (apk python3).
          python-version: "3.14"

      - name: Install deps
        # requirements.txt is hash-pinned, so pip enters --require-hashes mode and every
        # requirement in that command must be hashed — install the app deps on their own, then
        # the (unhashed) test tooling and the shared core separately. The core SHA is read from
        # the Dockerfile's ARG CORE_REF (single source of truth — no duplicate literal to drift),
        # so CI validates the exact core the image ships. --no-deps: core's third-party deps are
        # already satisfied by the hash-locked requirements.txt above.
        run: |
          python3 -m pip install --quiet -r renault_5/app/requirements.txt
          python3 -m pip install --quiet pytest pytest-cov
          CORE_REF="$(sed -n 's/^ARG CORE_REF=//p' renault_5/Dockerfile)"
          echo "renault-mqtt pinned to ${CORE_REF}"
          python3 -m pip install --quiet --no-deps \
            "renault-mqtt @ git+https://github.com/MatthewHobbs/renault-mqtt@${CORE_REF}"

      - name: pytest
        run: python3 -m pytest renault_5/tests -q --cov=renault_5/app --cov-report=term-missing --cov-fail-under=90

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Bandit (Python SAST)
        run: |
          python3 -m pip install --quiet bandit
          bandit -r renault_5/app -ll

      - name: pip-audit (dependency CVEs)
        run: |
          python3 -m pip install --quiet pip-audit
          pip-audit -r renault_5/app/requirements.txt

      - name: Trivy filesystem scan (vulns, misconfig, secrets)
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          trivy fs --scanners vuln,misconfig,secret \
            --severity HIGH,CRITICAL --exit-code 1 --ignore-unfixed .

  build:
    name: Build (amd64 sanity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0
      - name: Build image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          # Base image is pinned in the Dockerfile (FROM ghcr.io/home-assistant/base:<tag>),
          # so no BUILD_FROM build-arg is needed.
          context: ./renault_5
          push: false
