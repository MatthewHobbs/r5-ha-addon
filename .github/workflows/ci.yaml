name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: yamllint
        uses: ibiqlik/action-yamllint@2576378a8e339169678f9939646ee3ee325e845c # v3.1.1
        with:
          file_or_dir: renault_5 repository.yaml
          config_file: .yamllint

      - name: Hadolint (Dockerfile)
        uses: hadolint/hadolint-action@54c9adbab1582c2ef04b2016b760714a4bfde3cf # v3.1.0
        with:
          dockerfile: renault_5/Dockerfile
          config: .hadolint.yaml

      - name: ShellCheck (run.sh)
        uses: ludeeus/action-shellcheck@00cae500b08a931fb5698e11e79bfbd38e612a38 # v2.0.0
        with:
          scandir: renault_5
          additional_files: run.sh

      - name: Ruff (Python)
        uses: astral-sh/ruff-action@eaf0ecdd668ceea36159ff9d91882c9795d89b49 # v3.4.0
        with:
          src: renault_5/app renault_5/tests

      - name: Home Assistant add-on linter
        uses: frenck/action-addon-linter@de232482c564942a796a4427d3624f0d6c6e36e8 # v2.16.0
        with:
          path: ./renault_5

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.11"

      - name: Install deps
        run: python3 -m pip install --quiet -r renault_5/app/requirements.txt pytest pytest-cov

      - name: pytest
        run: python3 -m pytest renault_5/tests -q --cov=renault_5/app --cov-report=term-missing --cov-fail-under=90

  security:
    name: Security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Bandit (Python SAST)
        run: |
          python3 -m pip install --quiet bandit
          bandit -r renault_5/app -ll

      - name: pip-audit (dependency CVEs)
        run: |
          python3 -m pip install --quiet pip-audit
          pip-audit -r renault_5/app/requirements.txt

      - name: Trivy filesystem scan (vulns, misconfig, secrets)
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin
          trivy fs --scanners vuln,misconfig,secret \
            --severity HIGH,CRITICAL --exit-code 1 --ignore-unfixed .

  build:
    name: Build (amd64 sanity)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: docker/setup-buildx-action@6524bf65af31da8d45b59e8c27de4bd072b392f5 # v3.8.0
      - name: Build image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # v6.18.0
        with:
          context: ./renault_5
          push: false
          build-args: BUILD_FROM=ghcr.io/home-assistant/amd64-base:3.19
